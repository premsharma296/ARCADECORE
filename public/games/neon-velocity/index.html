<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Neon Velocity 3D</title>
  <style>
    body {
      margin: 0;
      background: #030108;
      color: #fff;
      font-family: 'Orbitron', 'Courier New', sans-serif;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      user-select: none;
    }
    #gameCanvas {
      border: 3px solid #ff007f;
      box-shadow: 0 0 40px rgba(255, 0, 127, 0.4), inset 0 0 20px rgba(255, 0, 127, 0.2);
      border-radius: 12px;
      background: #06020c;
      max-width: 95vw;
      max-height: 80vh;
    }
    .hud {
      display: flex;
      justify-content: space-between;
      width: 600px;
      max-width: 95vw;
      margin-bottom: 12px;
      font-size: 0.9rem;
      font-weight: bold;
      text-shadow: 0 0 10px rgba(255, 0, 127, 0.6);
      letter-spacing: 2px;
      color: #ff007f;
    }
    .bar-container {
      width: 140px;
      height: 12px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 0, 127, 0.3);
      border-radius: 6px;
      overflow: hidden;
      display: inline-block;
      vertical-align: middle;
      margin-left: 8px;
      box-shadow: 0 0 10px rgba(255, 0, 127, 0.1);
    }
    .bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #ff007f, #00f0ff);
      width: 100%;
      transition: width 0.1s ease;
    }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;900&display=swap" rel="stylesheet">
</head>
<body>

  <div class="hud">
    <div>SPEED: <span id="speedVal" style="color: #00f0ff; font-weight: 900;">0</span> KM/H</div>
    <div>SHIELD: <div class="bar-container"><div id="energyFill" class="bar-fill"></div></div></div>
    <div>SCORE: <span id="distVal" style="color: #00f0ff; font-weight: 900;">0</span> M</div>
  </div>
  <canvas id="gameCanvas" width="600" height="360"></canvas>

  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    let speed = 0;
    let maxSpeed = 220;
    let distance = 0;
    let energy = 100;
    let gameOver = false;

    // Track positioning
    let playerX = 0; // Steering deviation (-1.5 to 1.5)
    let roadY = canvas.height * 0.42; // Horizon height
    let segments = [];
    let trackLength = 2000;
    let camHeight = 1000;
    let camDepth = 0.8;
    let roadW = 2000;

    // Synthesized Sound Engine
    let audioCtx = null;
    let engineOsc = null;
    let engineGain = null;

    function initAudio() {
      try {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        engineOsc = audioCtx.createOscillator();
        engineGain = audioCtx.createGain();

        engineOsc.type = 'sawtooth';
        engineOsc.frequency.setValueAtTime(55, audioCtx.currentTime);
        engineGain.gain.setValueAtTime(0, audioCtx.currentTime);

        engineOsc.connect(engineGain);
        engineGain.connect(audioCtx.destination);
        engineOsc.start();
      } catch (e) {}
    }

    function updateAudio() {
      if (!audioCtx) return;
      try {
        // Modulate frequency based on speed
        const targetFreq = 45 + (speed / maxSpeed) * 110;
        engineOsc.frequency.setTargetAtTime(targetFreq, audioCtx.currentTime, 0.05);

        // Modulate volume
        const targetVol = speed > 0 ? 0.05 + (speed / maxSpeed) * 0.08 : 0;
        engineGain.gain.setTargetAtTime(targetVol, audioCtx.currentTime, 0.05);
      } catch (e) {}
    }

    function playBeep(freq, dur, type = 'sine') {
      if (!audioCtx) return;
      try {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.06, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + dur);
      } catch (e) {}
    }

    // Build pseudo-3D segment lines
    for (let i = 0; i < trackLength; i++) {
      // Create curvy segments using sine waves
      let curve = 0;
      if (i > 100 && i < 300) curve = 2.5;
      if (i > 400 && i < 600) curve = -3.5;
      if (i > 800 && i < 1100) curve = 4.5;
      if (i > 1300 && i < 1600) curve = -2.5;

      segments.push({
        index: i,
        p1: { x: 0, y: 0, z: i * 200 },
        p2: { x: 0, y: 0, z: (i + 1) * 200 },
        curve: curve,
        color: Math.floor(i / 3) % 2 === 0 ? '#12042b' : '#08011c'
      });
    }

    // Obstacle lists
    let obstacles = [];
    let particles = [];

    // Controller listeners
    let keys = {};
    window.addEventListener('keydown', e => {
      if (!audioCtx) initAudio();
      keys[e.code] = true;
    });
    window.addEventListener('keyup', e => keys[e.code] = false);

    // Mobile Steer support
    canvas.addEventListener('touchmove', e => {
      e.preventDefault();
      if (!audioCtx) initAudio();
      const rect = canvas.getBoundingClientRect();
      const touchX = e.touches[0].clientX - rect.left;
      playerX = (touchX / rect.width) * 3 - 1.5; // map to -1.5 .. 1.5
    });

    function spawnEntities() {
      if (gameOver) return;
      if (Math.random() < 0.3 && obstacles.length < 12) {
        const zSpawn = distance + 12000 + Math.random() * 8000;
        obstacles.push({
          x: Math.random() * 2.2 - 1.1, // Lane placement
          z: zSpawn,
          w: 60,
          h: 40,
          type: Math.random() < 0.35 ? 'battery' : 'hazard',
          speed: Math.random() * 25
        });
      }
    }

    setInterval(spawnEntities, 800);

    // Dynamic Horizon stars particle array
    let stars = [];
    for (let i = 0; i < 80; i++) {
      stars.push({ x: Math.random() * canvas.width, y: Math.random() * roadY, r: Math.random() * 1.5 + 0.5 });
    }

    function createCrashExplosion(x, y) {
      for (let i = 0; i < 25; i++) {
        particles.push({
          x: x,
          y: y,
          vx: (Math.random() - 0.5) * 8,
          vy: (Math.random() - 0.5) * 8 - 4,
          r: Math.random() * 4 + 2,
          color: Math.random() < 0.5 ? '#ff0055' : '#ffea00',
          life: 1.0,
          decay: Math.random() * 0.04 + 0.02
        });
      }
    }

    function project3D(p, camX, camY, camZ) {
      const scale = camDepth / (p.z - camZ);
      const xProj = canvas.width / 2 + (p.x - camX) * scale * canvas.width / 2;
      const yProj = roadY + (1000 - camY) * scale * (canvas.height - roadY);
      const wProj = scale * roadW * canvas.width / 2;
      return { x: xProj, y: yProj, w: wProj };
    }

    function update() {
      if (gameOver) return;

      // Fuel consumption and speed integration
      if (keys['ArrowUp'] || keys['KeyW']) {
        speed = Math.min(speed + 2.8, maxSpeed);
      } else {
        speed = Math.max(speed - 2.0, 0);
      }

      if (keys['ArrowLeft'] || keys['KeyA']) {
        playerX -= 0.05;
      }
      if (keys['ArrowRight'] || keys['KeyD']) {
        playerX += 0.05;
      }

      playerX = Math.max(-1.5, Math.min(1.5, playerX));

      if (speed > 0) {
        distance += Math.floor(speed * 0.08);
        energy -= (speed / maxSpeed) * 0.06;
      }

      if (energy <= 0) {
        energy = 0;
        gameOver = true;
        window.parent.postMessage({ type: 'arcadecore_score', score: distance }, '*');
      }

      document.getElementById('energyFill').style.width = `${energy}%`;
      document.getElementById('speedVal').innerText = Math.floor(speed);
      document.getElementById('distVal').innerText = distance;

      // Steer back drift to center road automatically when not steering
      if (!keys['ArrowLeft'] && !keys['KeyA'] && !keys['ArrowRight'] && !keys['KeyD']) {
        playerX *= 0.98;
      }

      // Update sound pitch
      updateAudio();

      // Check current segment curve drift factor
      const currentSegIdx = Math.floor(distance / 200) % trackLength;
      const currentSeg = segments[currentSegIdx];
      if (currentSeg && speed > 50) {
        playerX -= (currentSeg.curve * 0.003) * (speed / maxSpeed);
      }

      // Update particles
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx;
        p.y += p.vy;
        p.life -= p.decay;
        if (p.life <= 0) particles.splice(i, 1);
      }

      // Update obstacles
      for (let i = obstacles.length - 1; i >= 0; i--) {
        const obs = obstacles[i];
        obs.z -= speed * 0.25;

        // Collision logic
        if (obs.z - distance <= 120 && obs.z - distance >= -100) {
          if (Math.abs(obs.x - playerX) < 0.45) {
            obstacles.splice(i, 1);
            if (obs.type === 'hazard') {
              speed = Math.max(speed - 90, 0);
              energy = Math.max(energy - 25, 0);
              playBeep(90, 0.4, 'sawtooth');
              createCrashExplosion(canvas.width / 2, canvas.height - 70);
            } else {
              energy = Math.min(energy + 20, 100);
              playBeep(880, 0.25, 'sine');
              for (let k = 0; k < 10; k++) {
                particles.push({
                  x: canvas.width / 2, y: canvas.height - 70,
                  vx: (Math.random() - 0.5) * 5, vy: -Math.random() * 4 - 2,
                  r: Math.random() * 3 + 1, color: '#00f0ff', life: 1, decay: 0.04
                });
              }
            }
          }
        }

        // Clean off-screen obstacles
        if (obs.z - distance < -200) {
          obstacles.splice(i, 1);
        }
      }
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // 1. Draw Space Sky Parallax Backdrop
      ctx.fillStyle = '#05020c';
      ctx.fillRect(0, 0, canvas.width, roadY);

      // Glow Stars
      ctx.fillStyle = 'rgba(255, 255, 255, 0.7)';
      stars.forEach(s => {
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, 2 * Math.PI);
        ctx.fill();
      });

      // Neon Synthwave Sunset Grid Sun
      const sunGrad = ctx.createLinearGradient(0, roadY - 70, 0, roadY);
      sunGrad.addColorStop(0, '#ff007f');
      sunGrad.addColorStop(1, '#ffc000');
      ctx.fillStyle = sunGrad;
      ctx.shadowBlur = 20;
      ctx.shadowColor = '#ff007f';
      ctx.beginPath();
      ctx.arc(canvas.width / 2, roadY, 55, Math.PI, 2 * Math.PI);
      ctx.fill();
      ctx.shadowBlur = 0; // reset

      // Horizon glow line
      ctx.strokeStyle = '#ff007f';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(0, roadY);
      ctx.lineTo(canvas.width, roadY);
      ctx.stroke();

      // 2. Project and Draw 3D road segments
      const currentSegmentIdx = Math.floor(distance / 200);
      let dx = 0;
      let maxy = canvas.height;

      // Draw segments back-to-front
      for (let i = currentSegmentIdx; i < currentSegmentIdx + 50; i++) {
        if (i >= segments.length) break;
        const segment = segments[i];

        // Cam projection
        dx += segment.curve;
        const camX = playerX * roadW - dx;
        const camY = 1500;
        const camZ = distance;

        const p1 = project3D(segment.p1, camX, camY, camZ);
        const p2 = project3D(segment.p2, camX, camY, camZ);

        if (p2.y >= maxy) continue;
        maxy = p2.y;

        // Draw Road Base Segment Polygon
        ctx.fillStyle = segment.color;
        ctx.beginPath();
        ctx.moveTo(p1.x - p1.w, p1.y);
        ctx.lineTo(p1.x + p1.w, p1.y);
        ctx.lineTo(p2.x + p2.w, p2.y);
        ctx.lineTo(p2.x - p2.w, p2.y);
        ctx.closePath();
        ctx.fill();

        // Draw side neon stripes (magenta/blue side rails)
        ctx.fillStyle = Math.floor(i / 2) % 2 === 0 ? '#ff007f' : '#00f0ff';
        const stripeW1 = p1.w * 0.08;
        const stripeW2 = p2.w * 0.08;

        // Left stripe
        ctx.beginPath();
        ctx.moveTo(p1.x - p1.w, p1.y);
        ctx.lineTo(p1.x - p1.w + stripeW1, p1.y);
        ctx.lineTo(p2.x - p2.w + stripeW2, p2.y);
        ctx.lineTo(p2.x - p2.w, p2.y);
        ctx.closePath();
        ctx.fill();

        // Right stripe
        ctx.beginPath();
        ctx.moveTo(p1.x + p1.w, p1.y);
        ctx.lineTo(p1.x + p1.w - stripeW1, p1.y);
        ctx.lineTo(p2.x + p2.w - stripeW2, p2.y);
        ctx.lineTo(p2.x + p2.w, p2.y);
        ctx.closePath();
        ctx.fill();
      }

      // 3. Project and Draw obstacles and collectibles in 3D
      obstacles.forEach(obs => {
        const relativeZ = obs.z - distance;
        if (relativeZ <= 50 || relativeZ >= 15000) return;

        // Curve adjustment projection
        let dxOffset = 0;
        const currentSegmentIdx = Math.floor(distance / 200);
        const obsSegmentIdx = Math.floor(obs.z / 200);
        for (let i = currentSegmentIdx; i < obsSegmentIdx; i++) {
          if (segments[i]) dxOffset += segments[i].curve;
        }

        const scale = camDepth / relativeZ;
        const xProj = canvas.width / 2 + (obs.x * roadW - (playerX * roadW - dxOffset)) * scale * canvas.width / 2;
        const yProj = roadY + (1000 - 1500) * scale * (canvas.height - roadY);
        const size = scale * roadW * 0.04;

        if (xProj < -100 || xProj > canvas.width + 100) return;

        ctx.save();
        ctx.shadowBlur = 15;
        if (obs.type === 'hazard') {
          // Glow Orange Obstacle Hazard prism
          ctx.fillStyle = '#ff0055';
          ctx.shadowColor = '#ff0055';
          ctx.beginPath();
          ctx.moveTo(xProj, yProj - size * 1.5);
          ctx.lineTo(xProj - size, yProj);
          ctx.lineTo(xProj + size, yProj);
          ctx.closePath();
          ctx.fill();

          ctx.fillStyle = '#ffffff';
          ctx.font = `bold ${Math.floor(size * 0.6)}px monospace`;
          ctx.textAlign = 'center';
          ctx.fillText('⚠', xProj, yProj - size * 0.2);
        } else {
          // Glow Yellow energy battery Core
          ctx.fillStyle = '#00f0ff';
          ctx.shadowColor = '#00f0ff';
          ctx.beginPath();
          ctx.arc(xProj, yProj - size * 0.7, size * 0.7, 0, 2 * Math.PI);
          ctx.fill();

          ctx.fillStyle = '#ffffff';
          ctx.beginPath();
          ctx.arc(xProj, yProj - size * 0.7, size * 0.3, 0, 2 * Math.PI);
          ctx.fill();
        }
        ctx.restore();
      });

      // 4. Draw exploding crash particles
      particles.forEach(p => {
        ctx.fillStyle = p.color;
        ctx.globalAlpha = p.life;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, 2*Math.PI);
        ctx.fill();
      });
      ctx.globalAlpha = 1.0; // reset

      // 5. Draw Cybernetic Player vehicle ship in foreground
      const shipW = 75;
      const shipH = 35;
      const shipX = canvas.width / 2 - shipW / 2;
      const shipY = canvas.height - 75;

      ctx.save();
      ctx.shadowBlur = 20;
      ctx.shadowColor = '#ff007f';
      ctx.strokeStyle = '#ff007f';
      ctx.lineWidth = 3;

      // Draw sleek triangle cyber cruiser hovercraft
      ctx.fillStyle = '#06020c';
      ctx.beginPath();
      ctx.moveTo(shipX + 15, shipY); // nose tip
      ctx.lineTo(shipX + shipW - 15, shipY);
      ctx.lineTo(shipX + shipW, shipY + shipH);
      ctx.lineTo(shipX, shipY + shipH);
      ctx.closePath();
      ctx.fill();
      ctx.stroke();

      // Cyber wings stripes cyan grid
      ctx.strokeStyle = '#00f0ff';
      ctx.shadowColor = '#00f0ff';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(shipX + 10, shipY + 12);
      ctx.lineTo(shipX + shipW - 10, shipY + 12);
      ctx.stroke();

      // Back engine thruster fire
      if (speed > 10) {
        const fireLength = (speed / maxSpeed) * 35 * (0.8 + Math.random() * 0.4);
        const thrGrad = ctx.createLinearGradient(0, shipY + shipH, 0, shipY + shipH + fireLength);
        thrGrad.addColorStop(0, '#00f0ff');
        thrGrad.addColorStop(1, 'transparent');
        ctx.fillStyle = thrGrad;
        ctx.beginPath();
        ctx.moveTo(shipX + 25, shipY + shipH);
        ctx.lineTo(shipX + shipW - 25, shipY + shipH);
        ctx.lineTo(canvas.width / 2, shipY + shipH + fireLength);
        ctx.closePath();
        ctx.fill();
      }

      ctx.restore();

      // GameOver overlay text
      if (gameOver) {
        ctx.fillStyle = 'rgba(3, 1, 8, 0.85)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.fillStyle = '#ff007f';
        ctx.font = 'black 24px Orbitron';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('SHIELD TERMINATED', canvas.width / 2, canvas.height / 2 - 20);

        ctx.fillStyle = '#ffffff';
        ctx.font = '900 13px Orbitron';
        ctx.fillText('TAP ARROW UP OR PRESS W TO REFUEL & RESTART', canvas.width / 2, canvas.height / 2 + 25);
      }
    }

    function loop() {
      update();
      draw();

      if (gameOver && (keys['ArrowUp'] || keys['KeyW'])) {
        gameOver = false;
        speed = 0;
        distance = 0;
        energy = 100;
        obstacles = [];
        particles = [];
        document.getElementById('distVal').innerText = '0';
        document.getElementById('speedVal').innerText = '0';
      }

      requestAnimationFrame(loop);
    }

    loop();
  </script>
</body>
</html>
