<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flappy Cyber 3D</title>
  <style>
    body {
      margin: 0;
      background: #04010a;
      color: #fff;
      font-family: 'Orbitron', 'Courier New', sans-serif;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      user-select: none;
    }
    #gameCanvas {
      border: 3px solid #ec4899;
      box-shadow: 0 0 35px rgba(236, 72, 153, 0.4), inset 0 0 15px rgba(236, 72, 153, 0.15);
      border-radius: 12px;
      background: #080315;
    }
    .score {
      font-size: 1.1rem;
      font-weight: bold;
      color: #ec4899;
      margin-bottom: 12px;
      text-shadow: 0 0 10px rgba(236, 72, 153, 0.6);
      letter-spacing: 2px;
    }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
</head>
<body>

  <div class="score">SCORE: <span id="scoreVal" style="color: #00f0ff;">0</span></div>
  <canvas id="gameCanvas" width="360" height="460"></canvas>

  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    let score = 0;
    let gameOver = false;

    // Cyber Drone configurations
    let bird = {
      x: 75,
      y: 200,
      w: 24,
      h: 16,
      velocity: 0,
      gravity: 0.35,
      jump: -5.8,
      tilt: 0
    };

    let pipes = [];
    let particles = [];
    let thrusterParticles = [];
    const PIPE_WIDTH = 55;
    const PIPE_GAP = 110;
    let frameCount = 0;

    // Parallax background buildings
    let buildings = [];
    for (let k = 0; k < 6; k++) {
      buildings.push({
        x: k * 90,
        w: 60 + Math.random() * 40,
        h: 150 + Math.random() * 150,
        speed: 0.3
      });
    }

    let buildingsLayer2 = [];
    for (let k = 0; k < 8; k++) {
      buildingsLayer2.push({
        x: k * 70,
        w: 40 + Math.random() * 30,
        h: 80 + Math.random() * 100,
        speed: 0.15
      });
    }

    // Audio context synthesizers
    let audioCtx = null;
    function playSynth(freq, type, dur) {
      try {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.04, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + dur);
      } catch (e) {}
    }

    // Listeners
    window.addEventListener('keydown', e => {
      if (e.code === 'Space' || e.code === 'ArrowUp' || e.code === 'KeyW') flap();
    });
    canvas.addEventListener('mousedown', flap);
    canvas.addEventListener('touchstart', e => {
      e.preventDefault();
      flap();
    });

    function flap() {
      if (gameOver) return;
      bird.velocity = bird.jump;
      playSynth(380, 'sine', 0.1);

      // Spawn thruster sparks
      for (let k = 0; k < 6; k++) {
        thrusterParticles.push({
          x: bird.x - 5,
          y: bird.y + bird.h/2,
          vx: -Math.random() * 4 - 2,
          vy: (Math.random() - 0.5) * 3,
          r: Math.random() * 2 + 1,
          color: '#00f0ff',
          life: 1,
          decay: 0.05
        });
      }
    }

    function createCrashExplosion(x, y) {
      for (let i = 0; i < 20; i++) {
        particles.push({
          x: x,
          y: y,
          vx: (Math.random() - 0.5) * 6,
          vy: (Math.random() - 0.5) * 6 - 2,
          r: Math.random() * 4 + 1.5,
          color: Math.random() < 0.5 ? '#ec4899' : '#00f0ff',
          life: 1,
          decay: 0.04
        });
      }
    }

    function spawnPipe() {
      const minHeight = 50;
      const maxHeight = canvas.height - PIPE_GAP - 100;
      const topHeight = Math.random() * (maxHeight - minHeight) + minHeight;
      pipes.push({
        x: canvas.width,
        top: topHeight,
        bottom: canvas.height - topHeight - PIPE_GAP,
        passed: false
      });
    }

    function update() {
      if (gameOver) return;

      frameCount++;
      if (frameCount % 100 === 0) {
        spawnPipe();
      }

      // Parallax updates
      buildings.forEach(b => {
        b.x -= b.speed;
        if (b.x + b.w < 0) b.x = canvas.width;
      });
      buildingsLayer2.forEach(b => {
        b.x -= b.speed;
        if (b.x + b.w < 0) b.x = canvas.width;
      });

      // Drone physics
      bird.velocity += bird.gravity;
      bird.y += bird.velocity;
      bird.tilt = Math.min(Math.max(bird.velocity * 0.06, -0.4), 0.7);

      // Spark engine decay
      for (let i = thrusterParticles.length - 1; i >= 0; i--) {
        const tp = thrusterParticles[i];
        tp.x += tp.vx;
        tp.y += tp.vy;
        tp.life -= tp.decay;
        if (tp.life <= 0) thrusterParticles.splice(i, 1);
      }

      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx;
        p.y += p.vy;
        p.life -= p.decay;
        if (p.life <= 0) particles.splice(i, 1);
      }

      // Border hit checks
      if (bird.y < 0 || bird.y + bird.h > canvas.height) {
        gameOver = true;
        playSynth(120, 'sawtooth', 0.4);
        createCrashExplosion(bird.x + bird.w/2, bird.y + bird.h/2);
        window.parent.postMessage({ type: 'arcadecore_score', score }, '*');
      }

      // Obstacle pipes updates
      for (let i = pipes.length - 1; i >= 0; i--) {
        const p = pipes[i];
        p.x -= 2.2;

        // Collision Check
        if (
          bird.x + bird.w > p.x &&
          bird.x < p.x + PIPE_WIDTH &&
          (bird.y < p.top || bird.y + bird.h > canvas.height - p.bottom)
        ) {
          gameOver = true;
          playSynth(120, 'sawtooth', 0.4);
          createCrashExplosion(bird.x + bird.w/2, bird.y + bird.h/2);
          window.parent.postMessage({ type: 'arcadecore_score', score }, '*');
        }

        // Score check
        if (!p.passed && p.x + PIPE_WIDTH < bird.x) {
          p.passed = true;
          score++;
          document.getElementById('scoreVal').innerText = score;
          playSynth(880, 'sine', 0.15);
        }

        if (p.x + PIPE_WIDTH < 0) {
          pipes.splice(i, 1);
        }
      }
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // 1. Draw Space Sky Backdrop
      ctx.fillStyle = '#060310';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // 2. Draw Layer 2 Parallax Skyline (Far)
      ctx.fillStyle = '#100824';
      buildingsLayer2.forEach(b => {
        ctx.fillRect(b.x, canvas.height - b.h, b.w, b.h);
      });

      // 3. Draw Layer 1 Parallax Skyline (Near)
      ctx.fillStyle = '#1c0c38';
      buildings.forEach(b => {
        ctx.fillRect(b.x, canvas.height - b.h, b.w, b.h);
        // Draw tiny yellow cyber windows
        ctx.fillStyle = '#ffe600';
        ctx.globalAlpha = 0.15;
        for (let wy = canvas.height - b.h + 20; wy < canvas.height - 20; wy += 25) {
          ctx.fillRect(b.x + 10, wy, 8, 8);
          ctx.fillRect(b.x + b.w - 18, wy, 8, 8);
        }
        ctx.fillStyle = '#1c0c38'; // reset
        ctx.globalAlpha = 1.0;
      });

      // 4. Draw Laser Obstacle Pillars
      pipes.forEach(p => {
        ctx.save();
        ctx.shadowBlur = 15;
        ctx.shadowColor = '#00f0ff';

        // Laser beam graphics
        const laserGrad = ctx.createLinearGradient(p.x, 0, p.x + PIPE_WIDTH, 0);
        laserGrad.addColorStop(0, '#00bfff');
        laserGrad.addColorStop(0.5, '#ffffff');
        laserGrad.addColorStop(1, '#00bfff');

        ctx.fillStyle = laserGrad;
        // Top pillar
        ctx.fillRect(p.x, 0, PIPE_WIDTH, p.top);
        // Bottom pillar
        ctx.fillRect(p.x, canvas.height - p.bottom, PIPE_WIDTH, p.bottom);

        // Warning light caps
        ctx.fillStyle = '#ff007f';
        ctx.shadowColor = '#ff007f';
        ctx.fillRect(p.x - 2, p.top - 8, PIPE_WIDTH + 4, 8);
        ctx.fillRect(p.x - 2, canvas.height - p.bottom, PIPE_WIDTH + 4, 8);

        ctx.restore();
      });

      // 5. Draw active sparks
      ctx.save();
      thrusterParticles.forEach(tp => {
        ctx.fillStyle = tp.color;
        ctx.globalAlpha = tp.life;
        ctx.fillRect(tp.x, tp.y, tp.r, tp.r);
      });
      particles.forEach(p => {
        ctx.fillStyle = p.color;
        ctx.globalAlpha = p.life;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, 2*Math.PI);
        ctx.fill();
      });
      ctx.restore();

      // 6. Draw Cyber Drone Craft with rotation translation tilt
      ctx.save();
      ctx.translate(bird.x + bird.w/2, bird.y + bird.h/2);
      ctx.rotate(bird.tilt);

      ctx.shadowBlur = 15;
      ctx.shadowColor = '#ec4899';
      ctx.strokeStyle = '#ec4899';
      ctx.fillStyle = '#0f031b';
      ctx.lineWidth = 2.5;

      // Draw oval futuristic ship shell body
      ctx.beginPath();
      ctx.ellipse(0, 0, bird.w/2, bird.h/2, 0, 0, 2*Math.PI);
      ctx.fill();
      ctx.stroke();

      // Glowing Cyan visor
      ctx.fillStyle = '#00f0ff';
      ctx.shadowColor = '#00f0ff';
      ctx.beginPath();
      ctx.ellipse(4, -1, 6, 3, 0, 0, 2*Math.PI);
      ctx.fill();

      // Rotor blades
      ctx.strokeStyle = '#00f0ff';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(-10, -8);
      ctx.lineTo(-2, -8);
      ctx.stroke();

      ctx.restore();

      // Draw GameOver Screen
      if (gameOver) {
        ctx.fillStyle = 'rgba(4, 1, 10, 0.85)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.fillStyle = '#ec4899';
        ctx.font = 'bold 20px Orbitron';
        ctx.textAlign = 'center';
        ctx.fillText('DRONE TERMINATED', canvas.width / 2, canvas.height / 2 - 15);

        ctx.fillStyle = '#ffffff';
        ctx.font = '12px Orbitron';
        ctx.fillText('CLICK / TAP SCREEN TO REFLAP', canvas.width / 2, canvas.height / 2 + 15);
      }
    }

    function loop() {
      update();
      draw();

      if (gameOver && keys['Space']) {
        // Space support to restart
        resetGame();
      }

      requestAnimationFrame(loop);
    }

    // Direct click to restart on GameOver state
    canvas.addEventListener('click', () => {
      if (gameOver) {
        resetGame();
      }
    });

    function resetGame() {
      gameOver = false;
      score = 0;
      pipes = [];
      particles = [];
      thrusterParticles = [];
      bird.y = 200;
      bird.velocity = 0;
      bird.tilt = 0;
      frameCount = 0;
      document.getElementById('scoreVal').innerText = '0';
      playSynth(440, 'sine', 0.1);
    }

    loop();
  </script>
</body>
</html>
