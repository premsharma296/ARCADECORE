<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cyber Jump</title>
  <style>
    :root {
      --primary: #d946ef;
      --secondary: #06b6d4;
      --accent: #eab308;
      --background: #09090e;
      --foreground: #f1f1f5;
    }
    body {
      margin: 0;
      padding: 0;
      background-color: var(--background);
      color: var(--foreground);
      font-family: 'Orbitron', sans-serif;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }
    #game-container {
      position: relative;
      width: 100%;
      max-width: 600px;
      aspect-ratio: 4/5;
      border: 2px solid rgba(6, 182, 212, 0.3);
      border-radius: 16px;
      box-shadow: 0 0 20px rgba(6, 182, 212, 0.15);
      background-color: #0b0b14;
      overflow: hidden;
    }
    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }
    .hud {
      position: absolute;
      top: 15px;
      left: 15px;
      right: 15px;
      display: flex;
      justify-content: space-between;
      pointer-events: none;
      font-weight: 900;
      text-transform: uppercase;
      font-size: 14px;
      letter-spacing: 2px;
      text-shadow: 0 0 8px rgba(217, 70, 239, 0.6);
      color: var(--primary);
      z-index: 10;
    }
    .hud span {
      color: var(--foreground);
    }
    #menu, #game-over {
      position: absolute;
      inset: 0;
      background-color: rgba(9, 9, 14, 0.9);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 20;
      gap: 20px;
    }
    .btn {
      padding: 12px 30px;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--secondary), var(--primary));
      color: white;
      border: none;
      font-weight: 900;
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 2px;
      cursor: pointer;
      box-shadow: 0 0 15px rgba(6, 182, 212, 0.4);
      transition: all 0.2s;
    }
    .btn:hover {
      transform: scale(1.05);
      box-shadow: 0 0 25px rgba(217, 70, 239, 0.6);
    }
    h1 {
      margin: 0;
      font-size: 28px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 4px;
      background: linear-gradient(to right, var(--secondary), var(--primary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 0 30px rgba(6, 182, 212, 0.2);
    }
    .hidden {
      display: none !important;
    }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@900&display=swap" rel="stylesheet">
</head>
<body>
  <div id="game-container">
    <div class="hud">
      <div>Distance: <span id="dist-val">0m</span></div>
      <div>Max Record: <span id="best-val">0m</span></div>
    </div>

    <!-- Start Menu -->
    <div id="menu">
      <h1>Cyber Jump</h1>
      <button class="btn" id="start-btn">Start Bypass</button>
    </div>

    <!-- Game Over Screen -->
    <div id="game-over" class="hidden">
      <h1>Core Crashed</h1>
      <p style="margin: 0; text-transform: uppercase; letter-spacing: 2px; font-size: 12px; color: var(--primary)">Distance Traveled: <span id="final-dist" style="color: white; font-weight: bold;">0m</span></p>
      <button class="btn" id="retry-btn">Reboot System</button>
    </div>

    <canvas id="gameCanvas"></canvas>
  </div>

  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const distVal = document.getElementById('dist-val');
    const bestVal = document.getElementById('best-val');
    const startBtn = document.getElementById('start-btn');
    const retryBtn = document.getElementById('retry-btn');
    const menu = document.getElementById('menu');
    const gameOverScreen = document.getElementById('game-over');
    const finalDist = document.getElementById('final-dist');

    // Web Audio Synthesizer
    let audioCtx = null;
    function initAudio() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      if (audioCtx.state === 'suspended') {
        audioCtx.resume();
      }
    }

    function playSound(type) {
      if (!audioCtx) return;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);

      if (type === 'jump') {
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(150, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(600, audioCtx.currentTime + 0.12);
        gain.gain.setValueAtTime(0.06, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.12);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.12);
      } else if (type === 'double') {
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(300, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(900, audioCtx.currentTime + 0.1);
        gain.gain.setValueAtTime(0.06, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.1);
      } else if (type === 'crash') {
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(200, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(40, audioCtx.currentTime + 0.35);
        gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.35);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.35);
      } else if (type === 'powerup') {
        osc.type = 'sine';
        osc.frequency.setValueAtTime(400, audioCtx.currentTime);
        osc.frequency.setValueAtTime(800, audioCtx.currentTime + 0.08);
        gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.2);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.2);
      }
    }

    // Set canvas dimensions
    function resizeCanvas() {
      canvas.width = 600;
      canvas.height = 750;
    }
    resizeCanvas();

    // High Score tracking
    let highScore = parseInt(localStorage.getItem('cyberjump_high') || '0');
    bestVal.innerText = highScore + 'm';

    // Game Variables
    let gameSpeed = 5.5;
    const gravity = 0.5;
    let distance = 0;
    let gameRunning = false;
    let obstacles = [];
    let particles = [];
    let backgroundLines = [];

    // Player Configuration
    const player = {
      x: 80,
      y: canvas.height - 150,
      width: 32,
      height: 32,
      vy: 0,
      color: '#06b6d4',
      shadow: '#06b6d4',
      isJumping: false,
      jumpsUsed: 0,
      maxJumps: 2,
      trail: []
    };

    // Ground info
    const groundY = canvas.height - 100;

    // Trigger jump
    function jump() {
      if (player.jumpsUsed < player.maxJumps) {
        player.vy = -10.5;
        player.isJumping = true;
        player.jumpsUsed++;
        if (player.jumpsUsed === 1) {
          playSound('jump');
        } else {
          playSound('double');
        }
      }
    }

    // Bind Jump keys
    window.addEventListener('keydown', (e) => {
      if (e.key === ' ' || e.key === 'ArrowUp' || e.key === 'w') {
        initAudio();
        if (gameRunning) jump();
        e.preventDefault();
      }
    });

    window.addEventListener('touchstart', () => {
      initAudio();
      if (gameRunning) jump();
    });

    window.addEventListener('mousedown', () => {
      initAudio();
      if (gameRunning) jump();
    });

    // Seed back-lines
    function initBackground() {
      backgroundLines = [];
      for (let i = 0; i < 15; i++) {
        backgroundLines.push({
          x: Math.random() * canvas.width,
          y: Math.random() * groundY,
          length: Math.random() * 80 + 40,
          speed: Math.random() * 2 + 1
        });
      }
    }

    function createExplosion(x, y, color) {
      for (let i = 0; i < 15; i++) {
        particles.push({
          x: x,
          y: y,
          vx: (Math.random() - 0.5) * 8,
          vy: (Math.random() - 0.5) * 8,
          radius: Math.random() * 4 + 2,
          color: color,
          alpha: 1,
          decay: Math.random() * 0.04 + 0.02
        });
      }
    }

    function initGame() {
      distance = 0;
      gameSpeed = 5.5;
      obstacles = [];
      particles = [];
      player.y = groundY - player.height;
      player.vy = 0;
      player.jumpsUsed = 0;
      player.isJumping = false;
      player.trail = [];
      initBackground();
    }

    function update() {
      if (!gameRunning) return;

      // Increment Distance
      distance += 0.15;
      distVal.innerText = Math.floor(distance) + 'm';

      // Accelerate Slowly
      gameSpeed += 0.0006;

      // Update Parallax Background lines
      backgroundLines.forEach(line => {
        line.x -= line.speed * (gameSpeed * 0.3);
        if (line.x + line.length < 0) {
          line.x = canvas.width + Math.random() * 100;
          line.y = Math.random() * (groundY - 50);
        }
      });

      // Apply Gravity
      player.vy += gravity;
      player.y += player.vy;

      // Check ground collision
      if (player.y >= groundY - player.height) {
        player.y = groundY - player.height;
        player.vy = 0;
        player.isJumping = false;
        player.jumpsUsed = 0;
      }

      // Trail record
      player.trail.push({ x: player.x, y: player.y });
      if (player.trail.length > 8) player.trail.shift();

      // Spawn Obstacles
      if (obstacles.length === 0 || 
          (canvas.width - obstacles[obstacles.length - 1].x > (Math.random() * 150 + 200))) {
        
        const type = Math.random() > 0.4 ? 'barrier' : 'laser_gate';
        if (type === 'barrier') {
          const height = Math.random() * 30 + 30;
          obstacles.push({
            x: canvas.width,
            y: groundY - height,
            width: 20,
            height: height,
            color: '#d946ef',
            type: 'barrier'
          });
        } else {
          // Floating high voltage bar (must slide slide/duck or double jump)
          obstacles.push({
            x: canvas.width,
            y: groundY - 80,
            width: 25,
            height: 15,
            color: '#eab308',
            type: 'laser_gate'
          });
        }
      }

      // Move & Collide Obstacles
      for (let i = obstacles.length - 1; i >= 0; i--) {
        const obs = obstacles[i];
        obs.x -= gameSpeed;

        // Collision Check
        if (player.x < obs.x + obs.width &&
            player.x + player.width > obs.x &&
            player.y < obs.y + obs.height &&
            player.y + player.height > obs.y) {
          
          // Game Over Crash
          gameRunning = false;
          playSound('crash');
          createExplosion(player.x + player.width / 2, player.y + player.height / 2, player.color);
          
          if (distance > highScore) {
            highScore = Math.floor(distance);
            localStorage.setItem('cyberjump_high', highScore);
            bestVal.innerText = highScore + 'm';
          }
          finalDist.innerText = Math.floor(distance) + 'm';
          gameOverScreen.classList.remove('hidden');
          break;
        }

        // Remove offscreen
        if (obs.x + obs.width < 0) {
          obstacles.splice(i, 1);
        }
      }

      // Update Particles
      for (let p = particles.length - 1; p >= 0; p--) {
        const particle = particles[p];
        particle.x += particle.vx;
        particle.y += particle.vy;
        particle.alpha -= particle.decay;
        if (particle.alpha <= 0) {
          particles.splice(p, 1);
        }
      }
    }

    function draw() {
      // Clear Screen
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // Draw Parallax Grid lines
      ctx.strokeStyle = '#10101b';
      ctx.lineWidth = 1;
      backgroundLines.forEach(line => {
        ctx.beginPath();
        ctx.moveTo(line.x, line.y);
        ctx.lineTo(line.x + line.length, line.y);
        ctx.stroke();
      });

      // Draw Ground
      ctx.save();
      ctx.strokeStyle = '#06b6d4';
      ctx.shadowBlur = 10;
      ctx.shadowColor = '#06b6d4';
      ctx.lineWidth = 4;
      ctx.beginPath();
      ctx.moveTo(0, groundY);
      ctx.lineTo(canvas.width, groundY);
      ctx.stroke();
      ctx.restore();

      // Draw Obstacles
      obstacles.forEach(obs => {
        ctx.save();
        ctx.shadowBlur = 10;
        ctx.shadowColor = obs.color;
        ctx.fillStyle = obs.color;
        ctx.beginPath();
        ctx.roundRect(obs.x, obs.y, obs.width, obs.height, 4);
        ctx.fill();
        ctx.restore();
      });

      // Draw Player Trail
      player.trail.forEach((t, idx) => {
        ctx.save();
        ctx.globalAlpha = (idx / player.trail.length) * 0.4;
        ctx.fillStyle = player.color;
        ctx.beginPath();
        ctx.roundRect(t.x, t.y, player.width * (idx / player.trail.length), player.height * (idx / player.trail.length), 6);
        ctx.fill();
        ctx.restore();
      });

      // Draw Player
      ctx.save();
      ctx.shadowBlur = 12;
      ctx.shadowColor = player.color;
      ctx.fillStyle = '#ffffff';
      ctx.strokeStyle = player.color;
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.roundRect(player.x, player.y, player.width, player.height, 6);
      ctx.fill();
      ctx.stroke();
      ctx.restore();

      // Draw Particles
      particles.forEach(p => {
        ctx.save();
        ctx.globalAlpha = p.alpha;
        ctx.shadowBlur = 6;
        ctx.shadowColor = p.color;
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      });
    }

    function loop() {
      update();
      draw();
      requestAnimationFrame(loop);
    }

    startBtn.addEventListener('click', () => {
      initAudio();
      initGame();
      menu.classList.add('hidden');
      gameRunning = true;
      playSound('powerup');
    });

    retryBtn.addEventListener('click', () => {
      initAudio();
      initGame();
      gameOverScreen.classList.add('hidden');
      gameRunning = true;
      playSound('powerup');
    });

    loop();
  </script>
</body>
</html>
